name: Agent Generator

on:
  issues:
    types: [ labeled ]

jobs:
  generate-code:
    # Only run if the label added was 'status: planned'
    if: github.event.label.name == 'status:plan-approved'
    runs-on: ubuntu-latest

    # Needs permissions to push code and create PRs
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Generator Agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LLM_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO_NAME: ${{ github.repository }}
        run: python agents/generator.py

      - name: Commit, Push, and Create PR
        env:
          GH_TOKEN: ${{ secrets.AGENT_PAT }}
        run: |
          # Configure Git as a bot
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Create a new branch based on the issue number
          BRANCH_NAME="feature/agent-task-${{ github.event.issue.number }}"
          git checkout -b $BRANCH_NAME
          
          # Add and commit the files generated by the Python script
          git add .
          git commit -m "feat: agent generated code for issue #${{ github.event.issue.number }}" || echo "No changes to commit"
          
          # Push to the repo
          git push origin $BRANCH_NAME
          
          # Use GitHub CLI to create a Pull Request
          gh pr create \
            --title "🤖 Agent generated code for Issue #${{ github.event.issue.number }}" \
            --body "Automated PR generated by the Generator Agent. This addresses tasks in Issue #${{ github.event.issue.number }}."
