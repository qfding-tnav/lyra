name: Agent Generator

on:
  issues:
    types: [ labeled ]

jobs:
  generate-code:
    # Only run if the label added was 'status: planned'
    if: github.event.label.name == 'status:plan-approved' || github.event.label.name == 'status:evaluation-failed'
    runs-on: ubuntu-latest

    # Needs permissions to push code and create PRs
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Use PAT during checkout so that the git push at the end has high privileges
          token: ${{ secrets.AGENT_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Prepare Git Branch
        run: |
          BRANCH_NAME="feature/agent-task-${{ github.event.issue.number }}"

          # Switch to the branch if it exists, otherwise create it from main
          git checkout $BRANCH_NAME 2>/dev/null || git checkout -b $BRANCH_NAME

      - name: Run Generator Agent
        env:
          GITHUB_TOKEN: ${{ secrets.AGENT_PAT || secrets.GITHUB_TOKEN }}
          LLM_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO_NAME: ${{ github.repository }}
        run: python agents/generator.py

      - name: Commit, Push, and Create PR
        env:
          GH_TOKEN: ${{ secrets.AGENT_PAT }}
        run: |
          # Configure Git as a bot
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Create a new branch based on the issue number
          BRANCH_NAME="feature/agent-task-${{ github.event.issue.number }}"

          # Add and commit the files generated by the Python script
          git add artifacts/
          git commit -m "feat: agent generated code for issue #${{ github.event.issue.number }}" || echo "No changes to commit"
          
          # Pull with rebase to sync the remote history BEFORE pushing
          git pull --rebase origin $BRANCH_NAME || echo "Branch doesn't exist on remote yet, skipping pull."
          
          # Push to the repo
          git push -u origin $BRANCH_NAME
