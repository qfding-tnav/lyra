name: Build agent-runner image

# Builds and pushes the PGE agent-runner image to GHCR, then smoke-tests the
# ENVIRONMENT against a live PostGIS+pgvector service: Django (postgis backend +
# migrate), GIS system libs (GDAL/GEOS), PostGIS spatial queries, pgvector
# (extension + python pkg), and AWS tooling (CLI v2 + boto3). No app code needed —
# the check script is self-contained (.github/scripts/smoke_env.py). It also
# doubles as a requirements.txt completeness detector: a missing package fails
# the corresponding import check loudly.
on:
  push:
    branches: [main]
    paths:
      - '.github/docker/agent-runner.Dockerfile'
      - '.github/docker/db.Dockerfile'
      - 'requirements.txt'
      - '.github/workflows/build-image.yml'
      - '.github/scripts/smoke_env.py'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/cygnus-agent-runner
  DB_IMAGE: ghcr.io/${{ github.repository_owner }}/cygnus-test-db

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .github/docker/agent-runner.Dockerfile
          push: true
          tags: ${{ env.IMAGE }}:latest

  build-db:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push DB image (postgis + pgvector)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .github/docker/db.Dockerfile
          push: true
          tags: ${{ env.DB_IMAGE }}:latest

  smoke-test:
    needs: [build, build-db]
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository_owner }}/cygnus-agent-runner:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    services:
      db:
        # postgis + pgvector, so the full migration set (incl. ai_embedding's
        # CREATE EXTENSION vector) builds the test DB cleanly.
        image: ghcr.io/${{ github.repository_owner }}/cygnus-test-db:latest
        credentials:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v5

      - name: Verify environment (Django / GIS / PostGIS / pgvector / AWS)
        # Self-contained check — no app code required. Each pillar is exercised
        # for real: Django configures + migrates on the postgis backend, GDAL/GEOS
        # load through GeoDjango, PostGIS answers a spatial query, pgvector stores
        # vectors and answers a <-> query, and aws CLI / boto3 both respond.
        env:
          DB_HOST: db
          DB_PORT: "5432"
          # The map-data bucket (s3://tnavmapdata) only allows anonymous listing
          # from corporate source IPs, so on GitHub-hosted runners the S3 check
          # is SKIPPED until these secrets are configured — then it becomes a
          # real credentialed check automatically.
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL: ${{ secrets.AWS_ENDPOINT_URL }}
          AWS_DEFAULT_REGION: us-west-2
        run: python .github/scripts/smoke_env.py