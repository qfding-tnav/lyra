name: Build agent-runner image

# Builds and pushes the PGE agent-runner image to GHCR, then smoke-tests it against
# a live PostGIS service. The smoke test doubles as a "requirements.txt completeness"
# detector: if the app's import closure is missing a package, the test won't even
# reach "Ran N tests" and this workflow fails — telling you exactly what to add to
# artifacts/requirements.txt.
on:
  push:
    branches: [main]
    paths:
      - '.github/docker/agent-runner.Dockerfile'
      - '.github/docker/db.Dockerfile'
      - 'artifacts/requirements.txt'
      - '.github/workflows/build-image.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/xiaohai-idris/cygnus-agent-runner
  DB_IMAGE: ghcr.io/xiaohai-idris/cygnus-test-db

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .github/docker/agent-runner.Dockerfile
          push: true
          tags: ${{ env.IMAGE }}:latest

  build-db:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push DB image (postgis + pgvector)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .github/docker/db.Dockerfile
          push: true
          tags: ${{ env.DB_IMAGE }}:latest

  smoke-test:
    needs: [build, build-db]
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/xiaohai-idris/cygnus-agent-runner:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    services:
      db:
        # postgis + pgvector, so the full migration set (incl. ai_embedding's
        # CREATE EXTENSION vector) builds the test DB cleanly.
        image: ghcr.io/xiaohai-idris/cygnus-test-db:latest
        credentials:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v5

      - name: Run a sample test module against PostGIS
        # We only assert the environment WORKS (deps import, GIS loads, test DB builds,
        # tests execute) — NOT that every assertion passes, since the snapshot ships
        # some pre-existing failing tests. "Ran N tests" in the output == env is good.
        run: |
          set -uo pipefail
          {
            echo "from config.settings import *  # noqa: F401,F403"
            echo "DATABASES['default']['HOST'] = 'db'"
            echo "DATABASES['default']['PORT'] = '5432'"
            echo "DATABASES['default']['USER'] = 'postgres'"
            echo "DATABASES['default']['PASSWORD'] = 'postgres'"
            echo "DATABASES['default']['NAME'] = 'cygnus_test'"
            echo "DATABASES['default'].setdefault('TEST', {})['NAME'] = 'cygnus_test'"
          } > "$RUNNER_TEMP/ci_settings.py"

          # Stage the in-repo libs onto sys.path (settings.py adds Cygnus/lib). Cygnus/lib
          # is gitignored, so this mirrors run_test.sh without touching the tree.
          mkdir -p artifacts/Cygnus/lib
          cp -r artifacts/libs/* artifacts/Cygnus/lib/ 2>/dev/null || true

          # Use a REAL test label (the file is tests/models/test_space.py). A bogus label
          # makes Django report a 1-test import error and still print "Ran 1 test", which
          # would pass this check without ever building the DB — false green.
          cd artifacts/Cygnus
          PYTHONPATH="$RUNNER_TEMP" DJANGO_SETTINGS_MODULE=ci_settings \
            python manage.py test tests.models.test_space --noinput --verbosity=2 \
            2>&1 | tee /tmp/smoke.txt || true

          # Building the test DB runs the FULL migration set against the db service, so a
          # missing extension (e.g. pgvector) surfaces here as a NotSupportedError before
          # any test runs — fail loudly on it.
          if grep -qiE 'extension .* is not available|NotSupportedError|ModuleNotFoundError' /tmp/smoke.txt; then
            echo "::error::Environment is broken — see the error above (missing extension or package)."
            exit 1
          fi
          if ! grep -qE 'Ran [0-9]+ test' /tmp/smoke.txt; then
            echo "::error::Tests did not run — the test database failed to build."
            exit 1
          fi
          echo "✅ Environment OK: app imported, full migrations applied on postgis+pgvector, tests ran."