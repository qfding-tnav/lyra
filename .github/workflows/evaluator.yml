name: Agent Evaluator

on:
  issues:
    types: [ labeled ]

jobs:
  evaluate-code:
    # Wake up as soon as the Generator finishes its work
    if: github.event.label.name == 'status:test-runner-complete'
    runs-on: ubuntu-latest
    
    # Needs permissions to update the issue and push test code
    permissions:
      issues: write
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Use PAT during checkout so that the git push at the end has high privileges
          token: ${{ secrets.AGENT_PAT }}
          ref: feature/agent-task-${{ github.event.issue.number }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest # Mandatory: The Evaluator's bash tool uses this to run the tests

      - name: Run Evaluator Agent
        env:
          # MUST use the PAT here so that if the Evaluator applies the "status:test-failed" label, 
          # GitHub Actions will recognize it and wake the Generator back up!
          GITHUB_TOKEN: ${{ secrets.AGENT_PAT || secrets.GITHUB_TOKEN }}
          LLM_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO_NAME: ${{ github.repository }}
        run: python agents/evaluator.py

      - name: Commit and Push Test Files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Stage all files created by the Evaluator inside this specific issue's sandbox
          git add artifacts/
          
          # Commit only if there are new files to commit, otherwise silently pass
          git commit -m "test: auto-generated unit tests by Evaluator Agent for Issue #${{ github.event.issue.number }}" || echo "No changes to commit"
          
          # Push explicitly to the feature branch to guarantee it lands in the right place
          git push origin feature/agent-task-${{ github.event.issue.number }}
