name: Agent Evaluator

on:
  issues:
    types: [ labeled ]

# Serialize all agent runs for the same issue so overlapping events never race
# on labels or the feature branch.
concurrency:
  group: agent-issue-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  evaluate-code:
    # Wake up when the Test Runner finishes — whether the tests passed
    # (test-runner-complete) or failed (test-runner-failed). The Evaluator is the
    # arbiter that decides if a failure is a real code bug or a faulty generated test.
    if: github.event.label.name == 'status:test-runner-complete' || github.event.label.name == 'status:test-runner-failed'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Only needs to update the issue (labels + comments). It reads test results
    # from the issue comment and does not push code.
    permissions:
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Use PAT during checkout so that the git push at the end has high privileges
          token: ${{ secrets.AGENT_PAT }}
          ref: feature/agent-task-${{ github.event.issue.number }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Evaluator Agent
        env:
          # MUST use the PAT here so that if the Evaluator applies the "status:test-failed" label, 
          # GitHub Actions will recognize it and wake the Generator back up!
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN_PAT: ${{ secrets.AGENT_PAT}}
          LLM_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO_NAME: ${{ github.repository }}
        run: python agents/evaluator.py
