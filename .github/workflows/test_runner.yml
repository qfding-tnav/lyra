name: Agent Test Runner

on:
  issues:
    types: [ labeled ]

# Serialize re-runs of THIS workflow for the same issue so overlapping events
# never race on labels or the feature branch. The group must include the
# workflow name: all agent workflows listen on the same labeled event, so a
# shared group would make sibling workflows cancel each other.
concurrency:
  group: ${{ github.workflow }}-issue-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  plan-tasks:
    if: github.event.label.name == 'status:test-generation-complete'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Use PAT during checkout so that the git push at the end has high privileges
          token: ${{ secrets.AGENT_PAT }}
          ref: feature/agent-task-${{ github.event.issue.number }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Test Runner Agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN_PAT: ${{ secrets.AGENT_PAT}}
          LLM_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO_NAME: ${{ github.repository }}
        run: python agents/test_runner.py
