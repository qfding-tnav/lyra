name: Agent Planner

on:
  issues:
    types: [ opened ]
  issue_comment:
    types: [ created ] # Wake up when a human replies with feedback or approval

jobs:
  plan-tasks:
    if: github.event.sender.type != 'Bot' && !contains(github.event.sender.login, 'github-actions')
    runs-on: ubuntu-latest
    # Explicitly grant permissions to modify the issue
    permissions:
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Planner Agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Automatically provided by GitHub
          LLM_API_KEY: ${{ secrets.OPENAI_API_KEY }} # The secret you added earlier
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO_NAME: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: python agents/planner.py
