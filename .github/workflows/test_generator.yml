name: Agent Test Generator

on:
  issues:
    types: [ labeled ]

# Serialize re-runs of THIS workflow for the same issue so overlapping events
# never race on labels or the feature branch. The group must include the
# workflow name: all agent workflows listen on the same labeled event, so a
# shared group would make sibling workflows cancel each other.
concurrency:
  group: ${{ github.workflow }}-issue-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  plan-tasks:
    if: github.event.label.name == 'status:generation-complete'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Explicitly grant permissions to modify the issue
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Use PAT during checkout so that the git push at the end has high privileges
          token: ${{ secrets.AGENT_PAT }}
          ref: feature/agent-task-${{ github.event.issue.number }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Test Generator Agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN_PAT: ${{ secrets.AGENT_PAT}}
          LLM_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO_NAME: ${{ github.repository }}
        run: python agents/test_generator.py

      - name: Commit and Push Test Files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Stage all files created by the Test Generator inside this specific issue's sandbox
          git add artifacts/

          # Commit only if there are new files to commit, otherwise silently pass
          git commit -m "test: auto-generated unit tests by Test Generator Agent for Issue #${{ github.event.issue.number }}" || echo "No changes to commit"

          # Push explicitly to the feature branch to guarantee it lands in the right place
          git push origin feature/agent-task-${{ github.event.issue.number }}
